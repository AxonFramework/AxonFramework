name: Axon Framework PR Cascade Merge Up

on:
  pull_request:
    types: [closed]
    branches:
      - 'axon-[0-9]+.[0-9]+.x'

jobs:
  cascade-merge-up:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine target branch
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGED_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          # Parse the merged branch, e.g. axon-5.0.x -> major=5, minor=0
          if [[ "$MERGED_BRANCH" =~ ^axon-([0-9]+)\.([0-9]+)\.x$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
          else
            echo "Branch '$MERGED_BRANCH' does not match expected pattern. Skipping."
            exit 0
          fi

          NEXT_MINOR=$((MINOR + 1))
          CANDIDATE="axon-${MAJOR}.${NEXT_MINOR}.x"

          echo "Merged branch : $MERGED_BRANCH"
          echo "Next candidate: $CANDIDATE"

          # Check if the next minor patch branch exists on remote
          if git ls-remote --exit-code --heads origin "$CANDIDATE" > /dev/null 2>&1; then
            echo "target_branch=$CANDIDATE" >> "$GITHUB_OUTPUT"
            echo "Target branch found: $CANDIDATE"
          else
            echo "target_branch=main" >> "$GITHUB_OUTPUT"
            echo "No higher minor branch found — targeting main"
          fi

      - name: Create merge-up branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_BRANCH: ${{ github.event.pull_request.base.ref }}
          TARGET_BRANCH: ${{ steps.target.outputs.target_branch }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MERGE_BRANCH="merge-up/${SOURCE_BRANCH}-to-${TARGET_BRANCH}"

          # Ensure we have the target branch locally
          git fetch origin "$TARGET_BRANCH"
          git fetch origin "$SOURCE_BRANCH"

          # Create the merge-up branch from the target
          git checkout -b "$MERGE_BRANCH" "origin/${TARGET_BRANCH}"

          # Attempt to merge the source branch in
          if git merge --no-ff "origin/${SOURCE_BRANCH}" \
               -m "chore: merge ${SOURCE_BRANCH} into ${TARGET_BRANCH} (from PR #${PR_NUMBER})"; then
            echo "Merge succeeded cleanly."
          else
            echo "::warning::Merge conflict detected. Pushing branch anyway for manual resolution."
            # Stage whatever merged cleanly, leave conflicts for the PR reviewer
            git add -A
            git commit -m "chore: partial merge ${SOURCE_BRANCH} into ${TARGET_BRANCH} — conflicts need resolution"
          fi

          git push origin "$MERGE_BRANCH"

          # Build PR body
          BODY="## Automated merge-up

          This PR merges \`${SOURCE_BRANCH}\` into \`${TARGET_BRANCH}\` following the merge of #${PR_NUMBER} by @${PR_AUTHOR}.

          **Original PR:** #${PR_NUMBER} — ${PR_TITLE}

          > If there are conflicts, please resolve them before merging this PR."

          # Open the PR (idempotent — fails gracefully if it already exists)
          gh pr create \
            --base  "$TARGET_BRANCH" \
            --head  "$MERGE_BRANCH" \
            --title "chore: merge-up \`${SOURCE_BRANCH}\` → \`${TARGET_BRANCH}\` (#${PR_NUMBER})" \
            --body  "$BODY" \
            --label "merge-up" || echo "PR may already exist — skipping creation."